name: CI

# Run the test suite on every push and every pull request to main.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Django tests
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code.
      - name: Check out code
        uses: actions/checkout@v4

      # 2. Install the Python version the project targets.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # 3. Install dependencies from requirements.txt.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Static checks — fail fast on configuration problems.
      - name: Django system check
        run: python manage.py check

      # 5. Run the unit-test suite (the 7 business-rule tests).
      - name: Run tests
        run: python manage.py test --verbosity 2
